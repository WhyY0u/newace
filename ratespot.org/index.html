                    v: true,
                    text: "Bought usdt for 500$, everything smooth. Seller was chill, can negotiate conditions. Feel safe",
                    date: "Mar 18, 2026",
                    likes: 4,
                },
                {
                    id: "r12",
                    name: "vovan_05",
                    stars: 5,
                    v: false,
                    text: "Guys doubting - solid platform, been using for 3 months. Only buy from verified sellers",
                    date: "Apr 2, 2026",
                    likes: 9,
                },
                {
                    id: "r13",
                    name: "trader_igor",
                    stars: 4,
                    v: true,
                    text: "Trade p2p here in small volumes. Spreads can be nice if you look for them. Security is thorough, can ask for docs but thats actually good",
                    date: "Mar 28, 2026",
                    likes: 6,
                },
            ];

            const COL = [
                "#10b981",
                "#3b82f6",
                "#f59e0b",
                "#8b5cf6",
                "#06b6d4",
                "#ec4899",
                "#ef4444",
                "#84cc16",
                "#14b8a6",
            ];
            let curF = "all",
                pStars = 0;
            let likes = JSON.parse(localStorage.getItem("rs_likes") || "{}");

            function myR() {
                const r = localStorage.getItem("rs_rev_" + uid);
                return r ? JSON.parse(r) : null;
            }
            function stH(n) {
                return Array.from(
                    { length: 5 },
                    (_, i) =>
                        `<span style="color:${i < n ? "#fbbf24" : "#484f58"}">★</span>`,
                ).join("");
            }
            function ini(n) {
                return n.slice(0, 2).toUpperCase();
            }
            function scS(n) {
                if (n >= 5)
                    return "background:rgba(16,185,129,.15);color:#10b981";
                if (n >= 4)
                    return "background:rgba(59,130,246,.15);color:#3b82f6";
                return "background:rgba(251,191,36,.15);color:#fbbf24";
            }
            function match(r) {
                if (curF === "all") return true;
                if (curF === "5") return r.stars === 5;
                if (curF === "4") return r.stars === 4;
                if (curF === "3") return r.stars === 3;
                if (curF === "v") return !!r.v;
                return true;
            }
            function sortArr(a) {
                const s = document.getElementById("sort-sel")?.value || "date";
                const b = [...a];
                if (s === "rating-h") b.sort((x, y) => y.stars - x.stars);
                else if (s === "rating-l") b.sort((x, y) => x.stars - y.stars);
                else if (s === "helpful")
                    b.sort((x, y) => (y.likes || 0) - (x.likes || 0));
                return b;
            }
            function card(r, i, m) {
                const lk = !!likes[r.id];
                const cnt = (r.likes || 0) + (lk ? 1 : 0);
                return `<div class="rev${m ? " mine" : ""}">
      <div class="rev-top">
        <div class="av" style="background:${COL[i % COL.length]}">${ini(r.name)}</div>
        <div class="rev-info">
          <div class="rev-name">${r.name}${r.v ? ' <span class="badge-v">✓</span>' : ""}${m ? ' <span class="badge-me">Mine</span>' : ""}</div>
          <div class="rev-date">${r.date}</div>
        </div>
        <div class="rev-score" style="${scS(r.stars)}">${r.stars} ★</div>
      </div>
      <div class="rev-text">${r.text}</div>
      <div class="rev-foot">${m ? `<button class="del" onclick="delRev()">Delete</button>` : `<button class="hlp${lk ? " lk" : ""}" onclick="togLike('${r.id}',this)">👍 ${cnt}</button>`}</div>
    </div>`;
            }
            function rend() {
                const my = myR();
                const fs = document.getElementById("form-in");
                const ws = document.getElementById("write-box");
                const ms = document.getElementById("my-sec");
                const mg = document.getElementById("my-grid");
                const lst = document.getElementById("list");
                const cr = document.getElementById("cnt-row");
                if (my) {
                    fs.innerHTML = `<div class="already">You already posted a review <button class="del" style="margin-left:8px" onclick="delRev()">Delete</button></div>`;
                    if (match(my)) {
                        ms.style.display = "";
                        mg.innerHTML = card(my, 99, true);
                    } else ms.style.display = "none";
                }
                const filt = sortArr(STATIC.filter(match));
                cr.textContent = `Showing ${filt.length} of ${STATIC.length}`;
                lst.innerHTML = filt.length
                    ? filt.map((r, i) => card(r, i, false)).join("")
                    : '<div class="no-rev">No reviews match</div>';
            }
            function setF(f, el) {
                curF = f;
                document
                    .querySelectorAll(".fil")
                    .forEach((x) => x.classList.remove("on"));
                el.classList.add("on");
                rend();
            }
            function togLike(id, btn) {
                likes[id] = !likes[id];
                localStorage.setItem("rs_likes", JSON.stringify(likes));
                const r = STATIC.find((x) => x.id === id);
                btn.textContent =
                    "👍 " + ((r?.likes || 0) + (likes[id] ? 1 : 0));
                btn.classList.toggle("lk", !!likes[id]);
                showToast(likes[id] ? "Marked helpful" : "Vote removed");
            }

            document.getElementById("st-pk").addEventListener("click", (e) => {
                const s = e.target.closest("[data-v]");
                if (!s) return;
                pStars = +s.dataset.v;
                document
                    .querySelectorAll("#st-pk span")
                    .forEach(
                        (x, i) =>
                            (x.style.color =
                                i < pStars ? "#fbbf24" : "#484f58"),
                    );
            });
            document
                .getElementById("st-pk")
                .addEventListener("mouseover", (e) => {
                    const s = e.target.closest("[data-v]");
                    if (!s) return;
                    document
                        .querySelectorAll("#st-pk span")
                        .forEach(
                            (x, i) =>
                                (x.style.color =
                                    i < +s.dataset.v ? "#fbbf24" : "#484f58"),
                        );
                });
            document
                .getElementById("st-pk")
                .addEventListener("mouseleave", () => {
                    document
                        .querySelectorAll("#st-pk span")
                        .forEach(
                            (x, i) =>
                                (x.style.color =
                                    i < pStars ? "#fbbf24" : "#484f58"),
                        );
                });

            function toggleForm() {
                const ws = document.getElementById("write-box");
                ws.classList.toggle("show");
                if (ws.classList.contains("show"))
                    document.getElementById("f-name").focus();
            }
            function subReview() {
                const n = document.getElementById("f-name").value.trim();
                const t = document.getElementById("f-text").value.trim();
                if (!n) {
                    showToast("Enter name");
                    return;
                }
                if (!pStars) {
                    showToast("Pick rating");
                    return;
                }
                if (t.length < 15) {
                    showToast("Min 15 chars");
                    return;
                }
                const rev = {
                    id: "my_" + uid,
                    name: n,
                    stars: pStars,
                    text: t,
                    v: false,
                    date: new Date().toLocaleDateString("en-GB", {
                        day: "numeric",
                        month: "short",
                        year: "numeric",
                    }),
                    likes: 0,
                };
                localStorage.setItem("rs_rev_" + uid, JSON.stringify(rev));
                showToast("Review posted");
                document.getElementById("write-box").classList.remove("show");
                rend();
            }
            function delRev() {
                if (!confirm("Delete your review?")) return;
                localStorage.removeItem("rs_rev_" + uid);
                location.reload();
            }
            let tt;
            function showToast(m) {
                const t = document.getElementById("toast");
                t.textContent = m;
                t.classList.add("sh");
                clearTimeout(tt);
                tt = setTimeout(() => t.classList.remove("sh"), 2500);
            }
            rend();
        </script>
    </body>
</html>
