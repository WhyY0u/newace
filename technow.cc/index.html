<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#fafafa;--surface:#fff;--surface2:#f5f5f5;--border:#e5e5e5;--accent:#0071e3;--accent2:#0077cc;--text:#1d1d1d;--sub:#424245;--muted:#86868b;--star:#ffd60a;--r:12px}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Helvetica Neue",sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
.container{max-width:1200px;margin:0 auto;padding:40px 20px}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);background:rgba(255,255,255,.8)}
.header-inner{max-width:1200px;margin:0 auto;padding:16px 20px;display:flex;justify-content:space-between;align-items:center}
.logo{font-size:1.2rem;font-weight:700;letter-spacing:-0.02em}
.logo span{color:var(--accent)}
nav{display:flex;gap:32px;font-size:0.95rem}
nav a{color:var(--text);text-decoration:none;transition:color 0.2s}
nav a:hover{color:var(--accent)}
.hero{text-align:center;padding:60px 0;border-bottom:1px solid var(--border)}
.hero h1{font-size:3.2rem;font-weight:800;letter-spacing:-0.04em;margin-bottom:20px}
.hero p{font-size:1.2rem;color:var(--sub);margin-bottom:40px}
.rating-banner{display:flex;justify-content:center;gap:60px;flex-wrap:wrap}
.rating-item{display:flex;flex-direction:column;align-items:center}
.rating-num{font-size:2.8rem;font-weight:900;letter-spacing:-0.05em;color:var(--text)}
.rating-label{font-size:0.85rem;color:var(--muted);margin-top:8px;letter-spacing:0.05em}
.stars{font-size:1.4rem;color:var(--star);margin-top:6px}
.main-grid{display:grid;grid-template-columns:1fr 320px;gap:40px;margin:60px 0}
.reviews-section h2{font-size:1.5rem;font-weight:700;margin-bottom:32px;letter-spacing:-0.02em}
.review{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:28px;margin-bottom:16px;transition:all 0.3s}
.review:hover{border-color:var(--accent);box-shadow:0 4px 16px rgba(0,0,0,.08)}
.review-header{display:flex;gap:12px;margin-bottom:16px;align-items:flex-start}
.avatar{width:40px;height:40px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:0.9rem;flex-shrink:0}
.review-meta{flex:1}
.reviewer-name{font-weight:600;font-size:0.95rem}
.review-date{font-size:0.8rem;color:var(--muted);margin-top:2px}
.review-rating{display:flex;gap:2px;color:var(--star)}
.review-text{color:var(--sub);margin:12px 0;font-size:0.95rem;line-height:1.7}
.review-actions{display:flex;gap:12px;margin-top:16px;justify-content:space-between;align-items:center}
.review-like{background:none;border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:6px;font-size:0.8rem;cursor:pointer;transition:all 0.2s}
.review-like:hover{border-color:var(--accent);color:var(--accent)}
.badge{font-size:0.65rem;background:var(--accent);color:#fff;padding:2px 6px;border-radius:3px;font-weight:700}
.sidebar{display:flex;flex-direction:column;gap:24px}
.stats-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:24px}
.stats-label{font-size:0.75rem;text-transform:uppercase;color:var(--muted);letter-spacing:0.08em;margin-bottom:16px;font-weight:600}
.stat-bars{display:flex;flex-direction:column;gap:12px}
.bar-row{display:flex;align-items:center;gap:8px;font-size:0.8rem}
.bar-label{width:12px;color:var(--text);font-weight:600}
.bar-track{flex:1;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;background:var(--accent);border-radius:3px}
.bar-count{width:20px;text-align:right;color:var(--muted)}
.form-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:24px}
.form-card h3{font-size:1.1rem;margin-bottom:24px;font-weight:700}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:0.8rem;text-transform:uppercase;color:var(--text);margin-bottom:6px;font-weight:600;letter-spacing:0.05em}
.form-group input,.form-group textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:10px;font-family:inherit;font-size:0.9rem;color:var(--text);outline:none;transition:all 0.2s}
.form-group input:focus,.form-group textarea:focus{border-color:var(--accent);background:var(--surface)}
.form-group textarea{resize:none;height:80px}
.stars-input{display:flex;gap:6px;margin:10px 0}
.stars-input span{font-size:1.6rem;cursor:pointer;color:var(--muted);transition:all 0.1s}
.stars-input span.active{color:var(--star);transform:scale(1.1)}
.btn-submit{width:100%;background:var(--accent);color:#fff;border:none;border-radius:6px;padding:12px;font-weight:700;font-size:0.9rem;cursor:pointer;transition:all 0.2s;font-family:inherit;margin-top:8px}
.btn-submit:hover{background:var(--accent2);transform:translateY(-2px)}
.toast{position:fixed;bottom:20px;right:20px;background:var(--text);color:#fff;padding:12px 20px;border-radius:8px;font-size:0.85rem;opacity:0;transition:opacity 0.3s;pointer-events:none}
.toast.show{opacity:1;pointer-events:auto}
@media(max-width:900px){.main-grid{grid-template-columns:1fr;gap:24px}.hero h1{font-size:2.2rem}.rating-banner{gap:40px}.container{padding:20px}.header-inner{padding:12px 16px}nav{gap:16px;font-size:0.85rem}.form-group input,.form-group textarea{padding:8px;font-size:0.85rem}}
</style>
</head>
<body>
<header>
<div class="header-inner">
<div class="logo">Tech<span>Now</span></div>
<nav>
<a href="#reviews">Reviews</a>
<a href="#form">Write</a>
<a href="https://trust-change.io" target="_blank" style="background:var(--accent);color:#fff;padding:8px 16px;border-radius:6px;transition:all 0.2s" onmouseover="this.style.opacity='0.8'" onmouseout="this.style.opacity='1'">Visit →</a>
</nav>
</div>

<div class="container">
<div class="hero">
<h1>trust-change.io</h1>
<p>Secure P2P crypto exchange</p>
<div class="rating-banner">
<div class="rating-item">
<div class="rating-num">4.5</div>
<div class="rating-label">Average Rating</div>
<div class="stars">★★★★☆</div>
</div>
<div class="rating-item">
<div class="rating-num">18</div>
<div class="rating-label">Reviews</div>
</div>
</div>
</div>

<div class="main-grid">
<div class="reviews-section" id="reviews">

<div id="reviewsList"></div>

<div class="stats-card">
<div class="stats-label">Rating Distribution</div>
<div class="stat-bars">
<div class="bar-row">
<span class="bar-label">5</span>
<div class="bar-track"><div class="bar-fill" style="width:56%"></div></div>
<span class="bar-count">10</span>
</div>
<div class="bar-row">
<span class="bar-label">4</span>
<div class="bar-track"><div class="bar-fill" style="width:39%"></div></div>
<span class="bar-count">7</span>
</div>
<div class="bar-row">
<span class="bar-label">3</span>
<div class="bar-track"><div class="bar-fill" style="width:6%"></div></div>
<span class="bar-count">1</span>
</div>
</div>
</div>

<div class="form-card" id="form">
<h3>Write a Review</h3>
<form onsubmit="return false">
<div class="form-group">
<label>Your Name</label>
<input type="text" id="name" placeholder="Name" maxlength="30" />
</div>
<div class="form-group">
<label>Rating</label>
<div class="stars-input" id="stars">
<span data-v="1">★</span><span data-v="2">★</span><span data-v="3">★</span><span data-v="4">★</span><span data-v="5">★</span>
</div>
</div>
<div class="form-group">
<label>Review</label>
<textarea id="text" placeholder="Share your experience..."></textarea>
</div>
<button type="button" class="btn-submit" onclick="submitReview()">Submit</button>
</form>
</div>
</aside>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
let selectedStars=0;
const reviews=[
{name:"Max",stars:5,v:true,text:"Bought USDT via P2P here. Smooth transaction. Seller came online fast. Coins arrived in 3 mins. Rate slightly above market but worth it when urgent."},
{name:"Julia",stars:4,v:true,text:"Using P2P for few months. Commission is small. Just watch seller rating. Some cancel deals but it's fine."},
{name:"CryptoInvestor",stars:5,v:true,text:"Tired of jumping exchanges. This is solid. Bought BTC P2P. Checked blockchain after - all matched. Escrow works perfectly."},
{name:"Anna",stars:5,v:true,text:"Friend recommended. She buys here often. Liked it myself. Much simpler than exchange if you need to send crypto."},
{name:"SBoroda",stars:4,v:false,text:"Mediocre. Bought ether. Deal went through but waited 15 mins for confirmation. Support said network load. Got sorted."},
{name:"Marina",stars:5,v:true,text:"Exchanged rubles to usdt to send abroad. Banks rape you with fees. Here it's fine. Withdrew to trust wallet."},
{name:"Vit",stars:4,v:true,text:"Works. Buy when need to top up forex deposit fast. Speed ok. Sometimes bank blocks but that's on bank."},
{name:"Diana",stars:4,v:false,text:"Solid service, no hassle. Bought BTC to test. All arrived. Just need to verify ID first."},
{name:"CryptoNovice",stars:3,v:false,text:"Not bad but took a while figuring out. Tried card but limits. Ended up using sberbank. Read terms carefully."},
{name:"Gregory",stars:5,v:true,text:"Everything ok. Minimum 50 for withdrawal is fine. Much better than other options. Fast and reliable."},
{name:"Nastya",stars:4,v:false,text:"Bought usdt for 500$. Everything smooth. Seller was chill. Can negotiate conditions. Feel safe here."},
{name:"Vovan",stars:5,v:true,text:"Guys doubting - solid platform. Been using 3 months. Only buy from verified sellers. Works great."},
{name:"TraderIgor",stars:4,v:true,text:"Trade P2P here in small volumes. Spreads can be nice. Security thorough. Can ask for docs but good thing."},
{name:"Rachel",stars:5,v:false,text:"Switched from binance. Worth it for P2P. Works seamlessly. Transaction sync instant. Very happy."},
{name:"Tom",stars:4,v:true,text:"Solid platform build. Warranty on funds good. Performance never lags even with many users."},
{name:"Kate",stars:5,v:true,text:"Using exchanges 10 years. This is best. Everything smooth. Seller rating system convenient."},
{name:"Joe",stars:3,v:false,text:"Does what needed for trading. Rates competitive. Some better exchanges but this is good."},
{name:"Anna_Pro",stars:5,v:true,text:"Professional traders use this. P2P ecosystem unmatched. Escrow transparent. Best exchange."}
];

function render(){
const html=reviews.map((r,i)=>`<div class="review"><div class="review-header"><div class="avatar" style="background:hsl(${i*20},70%,50%)">${r.name[0]}</div><div class="review-meta"><div class="reviewer-name">${r.name}${r.v?' <span class="badge">✓</span>':''}</div><div class="review-date">${['Apr','Mar','Feb'][Math.floor(Math.random()*3)]} ${Math.floor(Math.random()*28)+1}</div><div class="review-rating">${'★'.repeat(r.stars)}${'☆'.repeat(5-r.stars)}</div></div></div><div class="review-text">${r.text}</div><div class="review-actions"><button class="review-like" onclick="toggleLike(this)">👍 ${Math.floor(Math.random()*12)+1}</button></div></div>`).join('');
document.getElementById('reviewsList').innerHTML=html;
}

document.getElementById('stars').addEventListener('click',e=>{
if(e.target.dataset.v){
selectedStars=+e.target.dataset.v;
document.querySelectorAll('#stars span').forEach((s,i)=>s.classList.toggle('active',i<selectedStars));
}
});

function submitReview(){
const name=document.getElementById('name').value.trim();
const text=document.getElementById('text').value.trim();
if(!name||!selectedStars||text.length<15){
showToast('Please fill all fields (min 15 chars)');
return;
}
showToast('Review submitted!');
document.getElementById('name').value='';
document.getElementById('text').value='';
selectedStars=0;
document.querySelectorAll('#stars span').forEach(s=>s.classList.remove('active'));
}

function toggleLike(btn){
btn.textContent=btn.textContent.includes('👍 ')?'👍 '+(parseInt(btn.textContent.split(' ')[1])+1):btn.textContent;
}

let toastTimer;
function showToast(msg){
const t=document.getElementById('toast');
t.textContent=msg;
t.classList.add('show');
clearTimeout(toastTimer);
toastTimer=setTimeout(()=>t.classList.remove('show'),2500);
}

render();
</script>
</body>
</html>
